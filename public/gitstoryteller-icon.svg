<line x1="142" y1="288" x2="350" y2="288" stroke="#c8bfaa" stroke-width="2.5" opacity="0.5"/>
<line x1="142" y1="320" x2="358" y2="320" stroke="#c8bfaa" stroke-width="2.5" opacity="0.5"/>
<line x1="142" y1="352" x2="344" y2="352" stroke="#c8bfaa" stroke-width="2.5" opacity="0.5"/>
<line x1="142" y1="384" x2="358" y2="384" stroke="#c8bfaa" stroke-width="2.5" opacity="0.5"/>
<line x1="142" y1="416" x2="350" y2="416" stroke="#c8bfaa" stroke-width="2.5" opacity="0.5"/>

<!-- Git graph — main branch (green) -->
<line x1="178" y1="72" x2="178" y2="440" stroke="#4ade80" stroke-width="8" stroke-linecap="round"/>

<!-- Commits on main -->
<circle cx="178" cy="96" r="14" fill="#4ade80"/>
<circle cx="178" cy="160" r="14" fill="#4ade80"/>
<circle cx="178" cy="272" r="14" fill="#4ade80"/>
<circle cx="178" cy="368" r="14" fill="#4ade80"/>
<circle cx="178" cy="430" r="14" fill="#4ade80"/>

<!-- Feature branch (blue) -->
<path d="M178 160 C222 160 222 186 222 208" stroke="#60a5fa" stroke-width="7" fill="none" stroke-linecap="round"/>
<line x1="222" y1="208" x2="222" y2="250" stroke="#60a5fa" stroke-width="7" stroke-linecap="round"/>
<path d="M222 250 C222 272 200 272 178 272" stroke="#60a5fa" stroke-width="7" fill="none" stroke-linecap="round"/>
<circle cx="222" cy="218" r="12" fill="#60a5fa"/>
<circle cx="222" cy="244" r="12" fill="#60a5fa"/>

<!-- Merge ring -->
<circle cx="178" cy="272" r="22" fill="none" stroke="#a78bfa" stroke-width="6" opacity="0.9"/>

<!-- Hotfix branch (pink) -->
<path d="M178 272 C262 272 262 300 262 316" stroke="#f472b6" stroke-width="6" fill="none" stroke-linecap="round"/>
<line x1="262" y1="316" x2="262" y2="352" stroke="#f472b6" stroke-width="6" stroke-linecap="round"/>
<path d="M262 352 C262 368 220 368 178 368" stroke="#f472b6" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.7"/>
