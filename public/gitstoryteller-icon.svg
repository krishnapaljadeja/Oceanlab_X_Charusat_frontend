<path d="M305 68 C338 55 370 65 388 84" fill="none" stroke="#c8bfaa" stroke-width="1.2" opacity="0.6"/>
<path d="M312 90 C342 76 368 84 380 104" fill="none" stroke="#c8bfaa" stroke-width="1.2" opacity="0.6"/>
<!-- Shaft -->
<path d="M296 144 L278 200 L284 200 L276 240 L290 196 L298 202Z" fill="#1a1a2e"/>
<circle cx="277" cy="241" r="7" fill="#1a1a2e"/>

<!-- Ink dot glow -->
<circle cx="277" cy="241" r="12" fill="#1a1a2e" opacity="0.2"/>

<!-- Corner sparkles -->
<circle cx="430" cy="68" r="5" fill="#f59e0b" opacity="0.7"/>
<circle cx="446" cy="90" r="3.5" fill="#60a5fa" opacity="0.6"/>
<circle cx="82" cy="46" r="4" fill="#4ade80" opacity="0.6"/>
<circle cx="68" cy="68" r="2.5" fill="#f472b6" opacity="0.5"/>
