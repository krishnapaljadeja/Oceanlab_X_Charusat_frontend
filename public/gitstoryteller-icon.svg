<!-- Quill pen — upper right of book page -->
<path d="M298 56 C356 30 402 56 412 92 C388 78 354 80 324 108 C348 88 372 96 374 124 C348 106 316 112 296 144 C302 116 298 84 298 56Z" fill="#ede8dd" stroke="#c8bfaa" stroke-width="1.5"/>
